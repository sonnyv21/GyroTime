<div class="booking-container">
  <h2 class="text-center">Reserve Your Table</h2>
  <form action="submit_booking.php" method="POST">
 
    <div class="mb-3">
      <label for="date" class="form-label">Select Date</label>
      <select class="form-select" id="date" name="date" required>
        <option value="">--Choose a date--</option>
        <option value="2024-07-01">April 1, 2026</option>
        <option value="2024-07-02">April 2, 2026</option>
        <option value="2024-07-03">April 3, 2026</option>
        <option value="2024-07-04">April 4, 2026</option>
      </select>
    </div>
   
    <div class="mb-3">
      <label for="time" class="form-label">Select Time</label>
      <select class="form-select" id="time" name="time" required>
        <option value="">--Choose a time--</option>
        <option value="6:00 PM">6:00 PM</option>
        <option value="6:30 PM">6:30 PM</option>
        <option value="7:00 PM">7:00 PM</option>
        <option value="7:30 PM">7:30 PM</option>
        <option value="8:00 PM">8:00 PM</option>
      </select>
    </div>
    
    <div class="mb-3">
      <label for="guests" class="form-label">Number of Guests</label>
      <select class="form-select" id="guests" name="guests" required>
        <option value="">--Number of guests--</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7+">7+</option>
      </select>
    </div>
    
    <button type="submit" class="btn-custom">Book Now</button>
  </form>
</div>
